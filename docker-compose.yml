version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: pamsimas_db
    environment:
      POSTGRES_USER: kipli_user
      POSTGRES_PASSWORD: kipli_password
      POSTGRES_DB: pamsimas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - pamsimas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kipli_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pamsimas_backend
    environment:
      # Database
      DATABASE_URL: postgresql://kipli_user:kipli_password@db:5432/pamsimas_db

      # Security
      SECRET_KEY: your-secret-key-change-this-in-production-min-32-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 300

      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8000

      # CORS
      FRONTEND_URL: http://localhost:8080

      # Upload Configuration
      UPLOAD_DIR: /app/uploads/foto_meteran
      MAX_UPLOAD_SIZE: 5242880  # 5MB
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads  # Fix: path uploads yang benar
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pamsimas_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Static files served with nginx)
  frontend:
    image: nginx:alpine
    container_name: pamsimas_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - pamsimas_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  pamsimas_network:
    driver: bridge
